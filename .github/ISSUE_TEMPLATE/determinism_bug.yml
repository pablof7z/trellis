name: "Bug: determinism / transaction ordering"
description: Report nondeterministic graph output, replay, phase ordering, or transaction behavior.
title: "Bug: "
labels: ["bug", "quality-gate"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What result was nondeterministic or ordered incorrectly?
    validations:
      required: true
  - type: textarea
    id: replay
    attributes:
      label: Replay or reproduction
      description: Provide the smallest transaction sequence, trace, or test that reproduces it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected deterministic result
      description: What same-input, same-state result should the graph produce?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation target
      description: Which trace, full-recompute, or phase-order test should catch this?
