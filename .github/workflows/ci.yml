name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    name: format, lint, test, docs, bench smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Serde trace replay test
        run: cargo test -p trellis-testing --features serde

      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      - name: Benchmark smoke
        run: cargo bench -p trellis-bench --bench performance_smoke

  generative:
    name: proptest and fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Proptest
        run: cargo test -p trellis-testing --features proptest

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz smoke
        working-directory: fuzz
        run: |
          cargo fuzz run resource_lifecycle -- -runs=256
          cargo fuzz run trace_replay -- -runs=256
